<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shasta PRA — Documents</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="topbar">
        <span class="logo">Shasta PRA</span>
        <nav>
            <a href="/">Dashboard</a>
            <a href="/requests">Requests</a>
            <a href="/documents">Documents</a>
            <a href="/departments">Departments</a>
            <a href="/search">Search</a>
            <a href="/analytics">Analytics</a>
        </nav>
    </div>

    <div class="container">
        <h1 class="page-title">Documents</h1>

        <div class="filters" id="filter-bar">
            <div class="filter-group">
                <label>Search</label>
                <input type="text" id="f-query" placeholder="Document title...">
            </div>
            <div class="filter-group">
                <label>File Type</label>
                <select id="f-ext"><option value="">All</option></select>
            </div>
            <div class="filter-group">
                <label>From</label>
                <input type="date" id="f-from">
            </div>
            <div class="filter-group">
                <label>To</label>
                <input type="date" id="f-to">
            </div>
            <div class="filter-group">
                <label>Sort</label>
                <select id="f-sort">
                    <option value="newest">Newest</option>
                    <option value="oldest">Oldest</option>
                    <option value="title">Title A-Z</option>
                    <option value="size">Largest</option>
                </select>
            </div>
            <button class="btn btn-primary" id="btn-filter">Filter</button>
            <button class="btn btn-secondary" id="btn-clear">Clear</button>
        </div>

        <div id="results-info" class="subtitle"></div>

        <div class="table-wrap">
            <table>
                <thead><tr>
                    <th>Title</th><th>Type</th><th>Size</th><th>Request</th><th>Date</th><th>Status</th><th></th>
                </tr></thead>
                <tbody id="doc-table"></tbody>
            </table>
        </div>

        <div class="pagination" id="pagination"></div>
    </div>

    <div class="lightbox-overlay" id="lightbox">
        <span class="lightbox-close" id="lb-close">&times;</span>
        <div class="lightbox-content" id="lb-content"></div>
    </div>

    <script src="/static/app.js"></script>
    <script src="/static/lightbox.js"></script>
    <script src="/static/documents.js"></script>
</body>
</html>
